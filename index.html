<style>
  :root{

    --border:#c8bca8;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",sans-serif;
    background:#f3efe7;
    color:#222;
  }
  .wrap{
    max-width:1100px;
    margin:24px auto;
    padding:0 16px 40px;
  }
  .panel{
    background:#fff;
    border:1px solid var(--border);
    box-shadow:0 10px 30px rgba(0,0,0,.08);
  }
  header{
    background:var(--ink);
    color:#fff;
    text-align:center;
    padding:16px 12px;
    font-size:26px;
    font-weight:800;
    letter-spacing:.03em;
  }
  .inputs{
    display:grid;
    grid-template-columns: 1.5fr 1fr;
    gap:0;
    border-top:1px solid var(--border);
    border-bottom:1px solid var(--border);
  }
  .block-title{
    background:var(--soft);
    font-weight:800;
    text-align:center;
    padding:8px;
    border-bottom:1px solid var(--border);
  }
  .input-area,.rule-area{border-right:1px solid var(--border)}
  .input-grid{
    display:grid;
    grid-template-columns: 170px 110px 80px 80px 100px 70px 70px 80px;
    align-items:center;
  }
  .rule-grid{
    display:grid;
    grid-template-columns: 90px 1fr 1fr;
    align-items:center;
  }
  .input-grid > div,.rule-grid > div{
    min-height:36px;
    padding:7px 8px;
    border-bottom:1px solid #e3d8c6;
    text-align:center;

  .label{background:var(--soft2);font-weight:700}
  input{
    width:88px;
    border:1px solid #d6caa6;
    background:var(--warn);
    border-radius:6px;
    padding:6px 8px;
    font-size:17px;
    font-weight:800;
    text-align:center;
  }
  .results-title{
    background:var(--ink);
    color:#fff;
    text-align:center;
    font-size:20px;
    font-weight:800;
    padding:10px;
    margin-top:22px;
  }
  .cards{
    display:grid;
    grid-template-columns: repeat(3,1fr);
    gap:28px;
    padding:24px 42px 18px;
  }
  .gua-card{
    border:1px solid var(--border);
    background:#fff;
    min-height:382px;
    text-align:center;
  }
  .gua-title{
    background:var(--soft);
    font-size:22px;
    font-weight:800;
    padding:10px;
    border-bottom:1px solid var(--border);
  }
  .lines{padding:10px 12px 0}
  .yao{
    font-family:Consolas,Menlo,monospace;
    height:30px;
    font-size:22px;
    line-height:30px;
    font-weight:900;
    color:#000;
    white-space:pre;
    letter-spacing:.03em;
  }
  .yao .mark{
    font-family:"Microsoft YaHei","PingFang SC",sans-serif;
    font-size:18px;
    margin-left:8px;
    font-weight:800;
  }
  .trigram-name{
    background:var(--paper);
    padding:9px 0;
    margin:2px 0 4px;
    color:#555;
    font-size:17px;
  }
  .hex-name{
    background:var(--soft2);
    padding:8px 0 10px;
    font-size:24px;
    font-weight:900;
  }
  .card-note{
    padding:8px 0 10px;
    font-size:14px;
    color:#555;
  }
  .summary{
    margin:0 42px 20px;
    background:var(--warn);
    border:1px solid var(--border);
    padding:12px;
    text-align:center;
    font-size:20px;
    font-weight:900;
  }
  .interpret{
    margin:0 42px 34px;
    background:#fff;
    border:1px solid var(--border);
  }
  .interpret-title{
    background:var(--ink);
    color:#fff;
    text-align:center;
    font-size:20px;
    font-weight:800;
    padding:10px;
  }
  .interp-head{
    background:var(--soft);
    font-weight:900;
    padding:8px 14px;
    border-top:1px solid var(--border);
  }
  .interp-body{
    background:var(--paper);
    padding:12px 14px 16px;
    line-height:1.75;
    min-height:58px;
    color:#222;
  }
  .error{
    color:#a40000;
    font-weight:800;
    padding:12px 42px;
    display:none;
  }

  .interp-body{white-space:pre-line;}
  .interp-source{font-size:12px;color:#666;margin-top:10px;padding-top:8px;border-top:1px dashed #d8ccb8;}
  .baike-body{background:#fffaf0;}
  .baike-links{display:flex;flex-wrap:wrap;gap:10px;margin:10px 0 6px;}
  .baike-btn{display:inline-block;padding:8px 12px;border:1px solid #b7a98f;border-radius:6px;background:#fff;color:#223322;text-decoration:none;font-weight:800;}
  .baike-btn:hover{background:#f7f1e7;}
  .baike-note{font-size:13px;color:#666;line-height:1.7;margin-top:8px;}
  @media (max-width:900px){
    .inputs{grid-template-columns:1fr}
    .input-area,.rule-area{border-right:0}
    .input-grid{grid-template-columns: 1.5fr 1fr 1fr 1fr;}
    .input-grid .wide{grid-column:auto}
    .cards{grid-template-columns:1fr; padding:18px}
    .summary,.interpret{margin-left:18px;margin-right:18px}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <header>梅花易数 · 翻书页起卦小工具</header>

    <section class="inputs">

          <div id="rem2">7</div>

          <div id="lowerName">艮</div>

    <section class="cards">
      <div class="gua-card" id="baseCard"></div>

    <section class="interpret" id="interpret"></section>
  </div>
</div>

  "坤":{"乾":"地天泰","兑":"地泽临","离":"地火明夷","震":"地雷复","巽":"地风升","坎":"地水师","艮":"地山谦","坤":"坤为地"}

const yaoCn = ["","初","二","三","四","五","上"];

const meanings = {
  "乾为天": "卦意：乾为纯阳刚健，主开创、领导、自强不息。占事多有主动推进之象，但过刚易亢，宜守正、稳健用力。",
  "天泽履": "卦意：履为行走、守礼、谨慎应对。占事多主在规则、边界或压力中前行，宜谦逊守分，步步谨慎。",
  "天火同人": "卦意：同人为结盟、同心、公开合作。占事利于沟通协作、求同存异，但须光明正大，忌私心暗争。",
  "天雷无妄": "卦意：无妄为自然真实、不妄动。占事宜顺其自然、守正待时；若强行造作，反易招损。",
  "天风姤": "卦意：姤为相遇、突发缘分或外来影响。占事多有意外接触、机会或诱因，宜分辨其善恶，不可被一时之象牵引。",
  "天水讼": "卦意：讼为争辩、纠纷、意见不合。占事宜先求和解、明辨是非，若执意相争，过程多费力。",
  "天山遁": "卦辞：遯，亨，小利贞。\n彖传：遯亨，遯而亨也。刚当位而应，与时行也。小利贞，浸而长也。遯之时义大矣哉！\n象传：天下有山，遯；君子以远小人，不恶而严。\n梅花简断：遯不是单纯逃避，而是看见外势渐强、暂不宜硬碰时，主动退让、收敛锋芒、保全实力。断事宜守正、设边界、少争辩；退一步反而能通。",
  "天地否": "卦意：否为闭塞不通、上下不交。占事多有阻隔、沟通不畅或时运未开，宜守正藏器，等待气机转通。",
  "泽天夬": "卦意：夬为决断、破除、公开表态。占事宜果断处理积压问题，但须正大光明，避免刚猛伤人。",
  "兑为泽": "卦意：兑为悦、口舌、交流。占事利沟通、喜庆、谈判，但也防言语过度、轻诺或口舌是非。",
  "泽火革": "卦意：革为变革、除旧更新。占事主旧局难续，宜顺势改革；但变革须有时机与名分，不可躁变。",
  "泽雷随": "卦意：随为顺从、跟随、因势而动。占事宜观察趋势、随缘应变，顺势则通，盲从则失主见。",
  "泽风大过": "卦意：大过为压力过重、结构失衡。占事多有承担过量或事态偏重之象，宜减负、调衡、寻找支点。",
  "泽水困": "卦意：困为受限、资源不足、心力受困。占事虽难展手脚，但守志不失则可出困，忌怨怼躁进。",
  "泽山咸": "卦意：咸为感应、情感、互相吸引。占事重在感受与互动，真诚相应则吉，急切控制则反失其和。",
  "泽地萃": "卦意：萃为聚集、汇合、人气资源集中。占事利会合、组织、求助，但须有主心骨与清晰秩序。",
  "火天大有": "卦意：大有为丰盛、拥有、光明在上。占事多有资源、成果与机会，但越有所得越宜谦守，忌骄满。",
  "火泽睽": "卦意：睽为背离、差异、各有所见。占事多有意见不一或关系疏离，宜求小同、缓和分歧。",
  "离为火": "卦意：离为光明、依附、显现。占事利名声、文书、表达与看清真相，但须有所依，忌浮躁外露。",
  "火雷噬嗑": "卦意：噬嗑为咬合、执法、清除障碍。占事有阻隔需处理，宜明规则、断是非，问题解决后才通。",
  "火风鼎": "卦意：鼎为更新、成器、养贤。占事利调整结构、改造旧物、建立新秩序，重在稳火慢成。",
  "火水未济": "卦意：未济为未完成、事在半途。占事仍有不稳定与遗漏，宜谨慎收尾，最后阶段尤不可大意。",
  "火山旅": "卦意：旅为旅居、漂泊、在外处事。占事主临时状态或外部环境不稳，宜低调守礼，不宜恋战。",
  "火地晋": "卦意：晋为进升、光明显达。占事利推进、升迁、展示才能，但须以德服人，稳步上进。",
  "雷天大壮": "卦意：大壮为声势强盛、力量外发。占事有强力推进之象，但强而须正，忌恃强冒进。",
  "雷泽归妹": "卦意：归妹为关系未正、次序不稳。占事多有情感、人际或合作中的不对位，宜审名分、缓定局。",
  "雷火丰": "卦意：丰为盛大、明动、繁荣。占事一时声势旺盛，利展示与行动；但盛极易散，宜预留退路。",
  "震为雷": "卦意：震为动、惊、启动。占事多有突发、消息、变动之象，先惊后定，宜迅速反应但不可慌乱。",
  "雷风恒": "卦意：恒为持久、常道、稳定经营。占事利长期坚持与守信，忌三心二意，贵在有恒。",
  "雷水解": "卦意：解为解除、舒缓、脱困。占事阻滞开始松动，宜化解矛盾、释放压力，把握转机。",
  "雷山小过": "卦意：小过为小事可过、大事宜谨。占事宜低飞谨行、细节补救，不宜逞强做大。",
  "雷地豫": "卦意：豫为预备、喜悦、顺势发动。占事有动员、人心、计划之象，先备后动则顺。",
  "风天小畜": "卦意：小畜为小有积蓄、小阻小成。占事一时不能大展，宜积累资源、温和推进。",
  "风泽中孚": "卦意：中孚为诚信、内心真实、感通。占事以诚为本，利沟通与信任建立；虚饰则难成。",
  "风火家人": "卦意：家人为家道、内务、秩序。占事重在内部关系、责任分工与规矩，内正则外顺。",
  "风雷益": "卦意：益为增益、帮助、利益增长。占事有助力与上升机会，利利他、互惠、顺势扩展。",
  "巽为风": "卦意：巽为入、顺、渗透。占事宜柔顺推进、循序沟通，以细微入手；过柔则散。",
  "风水涣": "卦意：涣为涣散、分离、化解。占事宜先散其郁结、疏通人心，聚焦之后方可成事。",
  "风山渐": "卦辞：渐，女归吉，利贞。\n彖传：渐之进也，女归吉也。进得位，往有功也；进以正，可以正邦也。其位，刚得中也；止而巽，动不穷也。\n象传：山上有木，渐；君子以居贤德，善俗。\n梅花简断：渐主循序渐进、由浅入深。此卦不宜急成，重步骤、名分、秩序与长期积累；守正慢进，反而能稳稳成事。",
  "风地观": "卦意：观为观察、审视、示范。占事宜先看清局势与人心，以身作则，未宜急动。",
  "水天需": "卦意：需为等待、蓄势、待时而动。占事条件未齐，宜守信养气，时机到来再行动。",
  "水泽节": "卦意：节为节制、规矩、分寸。占事宜定界限、控节奏，适度则吉，过严则困。",
  "水火既济": "卦意：既济为已成、既定、阶段完成。占事看似圆满，但成后易变，须防松懈与反复。",
  "水雷屯": "卦意：屯为初生艰难、草创阻滞。占事起步不易，宜扎根、求助、循序建立。",
  "水风井": "卦意：井为供养、资源、制度长用。占事宜回到根本、整理资源，井养众人，重稳定持续。",
  "坎为水": "卦意：坎为险、陷、反复考验。占事多有风险或心理压力，宜守信谨行，逐步脱险。",
  "水山蹇": "卦意：蹇为行难、受阻、险在前。占事不宜硬进，宜回头修正、求助贤人，绕路反可通。",
  "水地比": "卦意：比为亲附、结伴、选择依靠。占事利合作与结盟，但须择善而从，早定则吉。",
  "山天大畜": "卦意：大畜为蓄养大力、止而能成。占事宜储备、学习、约束锋芒，厚积后可大用。",
  "山泽损": "卦意：损为减损、取舍、以少成多。占事宜删繁就简、舍小保大，诚心而损则反得。",

  "山雷颐": "卦意：颐为养、口、滋养与言语。占事重在养身养德、谨言慎食，先养正气。",
  "山风蛊": "卦意：蛊为积弊、旧病、整治。占事多有陈旧问题需清理，宜追根溯源，修旧立新。",
  "山水蒙": "卦意：蒙为启蒙、未明、学习。占事处于迷雾初开之时，宜求教、守规矩，不宜自作聪明。",
  "艮为山": "卦意：艮为止、静、界限。占事宜止则止、稳住不动，先定心定界，动则须有度。",
  "山地剥": "卦意：剥为剥落、衰退、基础受损。占事多见消耗与不稳，宜保守、止损、待复。",
  "地天泰": "卦意：泰为通泰、天地交、上下和。占事气机畅通，利合作发展，但通泰时更须防懈怠。",
  "地泽临": "卦意：临为接近、督临、机会来临。占事利靠近目标、主动关照，但盛临有期限，宜及时把握。",
  "地火明夷": "卦意：明夷为光明受伤、才智受抑。占事宜韬光养晦、内明外顺，不宜强出头。",
  "地雷复": "卦意：复为回返、复苏、一阳来复。占事有转机和回头路，宜从小处重新开始。",
  "地风升": "卦意：升为上升、渐进、积小成大。占事宜循阶而上，借助贵人与时势，不可跳跃冒进。",
  "地水师": "卦意：师为众、纪律、组织行动。占事须有章法与领导，群体之事宜正名分、严号令。",
  "地山谦": "卦意：谦为谦逊、退让而有益。占事宜低姿态、守实不争，谦能聚福，满招损。",
  "坤为地": "卦意：坤为纯阴柔顺、承载包容。占事利配合、积累、守成，以厚德载物；忌无主见和过分被动。"
};
const yaoStage = {
  "1": "初爻主事情刚起、根基与起因。此爻动，表示变化从最底层开始，宜先稳基础，不宜急于定论。",
  "2": "二爻居内卦中位，主自身状态、内部条件与可依凭之处。此爻动，宜取中道，先把内在关系理顺。",
  "3": "三爻处内外交界之前，多为进退关口。此爻动，容易有压力、反复或犹豫，宜守分防躁。",
  "4": "四爻入外卦之初，主外部环境、人际位置与实际行动。此爻动，表示局面开始向外变化，宜审势调整。",
  "5": "五爻为尊位、中位，主关键人物、核心决定与成败所在。此爻动，宜得中守正，主动把握主要矛盾。",
  "6": "上爻居卦之极，主结果、收束、过度与下一阶段。此爻动，提醒知止、收尾，避免过犹不及。"
};
const lineOverrides = {
  "天山遁|4": "九四爻辞：好遯，君子吉，小人否。\n小象：君子好遯，小人否也。\n梅花简断：第四爻入外卦，事情已经开始受外部环境牵动。此爻动，关键在“好遯”——主动、得体、有原则地抽身，君子能舍不合时宜的人事而吉；若贪恋、强争、放不下，反成“小人否”。",
  "风山渐|4": "六四爻辞：鸿渐于木，或得其桷，无咎。\n小象：或得其桷，顺以巽也。\n梅花简断：第四爻位置并非最安稳，好比鸿雁暂落于木；但若能找到可凭借的“桷”，仍可无咎。断事宜先求落脚点、借势安顿、柔顺调整，不宜急进硬上。"
};

function lineMeaning(hexName, move){
  const key = `${hexName}|${move}`;
  if(lineOverrides[key]) return lineOverrides[key];
  const label = yaoCn[move] === "初" ? "初爻" : (yaoCn[move] === "上" ? "上爻" : `${yaoCn[move]}爻`);
  return `第${label}动：${yaoStage[move]}结合【${hexName}】的卦意，本爻就是此卦的变化关口；断事时可看本卦为现状，此爻为转折，变卦为后势。`;
}
function baikeItemUrl(name){
  return `https://baike.baidu.com/item/${encodeURIComponent(name)}`;
}
function baikeSearchUrl(name){
  return `https://www.baidu.com/s?wd=${encodeURIComponent(name + " 百度百科 周易 六十四卦")}`;
}
function buildBaikeLinks(baseName, changedName){
  return `
    <div class="interp-head">百度百科资料入口（自动对应本卦 / 变卦）</div>
    <div class="interp-body baike-body">
      <div>这一栏不硬复制百科全文，而是给当前卦自动生成百度百科入口；百科原文、目录、图片和最新修订内容以百度百科页面为准。</div>
      <div class="baike-links">
        <a class="baike-btn" target="_blank" rel="noopener" href="${baikeItemUrl(baseName)}">打开本卦百科：${baseName}</a>
        <a class="baike-btn" target="_blank" rel="noopener" href="${baikeSearchUrl(baseName)}">检索本卦资料</a>
        <a class="baike-btn" target="_blank" rel="noopener" href="${baikeItemUrl(changedName)}">打开变卦百科：${changedName}</a>
        <a class="baike-btn" target="_blank" rel="noopener" href="${baikeSearchUrl(changedName)}">检索变卦资料</a>
      </div>
      <div class="baike-note">建议阅读顺序：先看“基本信息/卦象”，再看“原文/白话解析”，最后看“传统解卦/事业财运婚恋”等分类。若直达词条打不开，请用“检索资料”按钮。</div>
    </div>
  `;
}

function buildInterpret(baseName, mutualName, changedName, move){
  return `
    <div class="interpret-title">周易原文 / 彖象 / 梅花断语（自动随输入变化）</div>
    <div class="interp-head">本卦【${baseName}】经典卦意</div>
    <div class="interp-body">${meanings[baseName] || "暂无解读。"}</div>
    <div class="interp-head">本卦动爻：第${yaoCn[move]}爻（爻辞 + 小象 + 梅花简断）</div>
    <div class="interp-body">${lineMeaning(baseName, move)}</div>
    <div class="interp-head">变卦【${changedName}】经典卦意</div>
    <div class="interp-body">${meanings[changedName] || "暂无解读。"}</div>
    <div class="interp-head">变卦同位爻参考：第${yaoCn[move]}爻（爻辞 + 小象 + 梅花简断）</div>
    <div class="interp-body">${lineMeaning(changedName, move)}</div>
    <div class="interp-head">梅花总断提示</div>
    <div class="interp-body">本卦【${baseName}】看眼下处境；互卦【${mutualName}】看内在原因与中间过程；第${yaoCn[move]}爻为转折点；变卦【${changedName}】看后续趋势。断卦时以本卦为主、动爻为关键、变卦为后势，变卦同位爻只作趋势参考。</div>
    ${buildBaikeLinks(baseName, changedName)}
    <div class="interp-source">本站内置解释以《周易》卦辞、爻辞、彖传、象传为底本，并结合梅花易数断法整理；百度百科入口用于查看更全面的外部资料和最新版词条。</div>
  `;
}


function mod(n,m){ return ((n % m) + m) % m; }
function lineHtml(v, mark){
  return `<div class="yao">${v ? "━━━━━━" : "━━  ━━"}${mark ? `<span class="mark">${mark}</span>` : ""}</div>`;
}
function buildHexagram(upper, lower, lines, title, note, move, marker){
  const top = [6,5,4].map(n => lineHtml(lines[n-1], marker && move === n ? `←${marker}` : "")).join("");
  const bottom = [3,2,1].map(n => lineHtml(lines[n-1], marker && move === n ? `←${marker}` : "")).join("");
  const name = hex[upper.name][lower.name];
  return `
    <div class="gua-title">${title}</div>
    <div class="lines">
      ${top}
      <div class="trigram-name">${upper.name}</div>
      ${bottom}
      <div class="trigram-name">${lower.name}</div>
    </div>
    <div class="hex-name">${name}</div>
    <div class="card-note">${note}</div>
  `;
}
function update(){
  const n1 = Number(document.getElementById("num1").value);
  const n2 = Number(document.getElementById("num2").value);
  const ok = Number.isFinite(n1) && Number.isFinite(n2);
  document.getElementById("error").style.display = ok ? "none" : "block";
  if(!ok) return;

  const r1 = mod(Math.trunc(n1),8);
  const r2 = mod(Math.trunc(n2),8);
  const upper = trigramByRemainder[r1];
  const lower = trigramByRemainder[r2];
  const sum = Math.trunc(n1) + Math.trunc(n2);
  const moveRaw = mod(sum,6);
  const move = moveRaw === 0 ? 6 : moveRaw;

  const baseLines = lower.lines.concat(upper.lines); // 自下而上 1-6爻
  const changedLines = baseLines.slice();
  changedLines[move-1] = 1 - changedLines[move-1];

  const changedLower = trigramByLines[changedLines.slice(0,3).join("")];
  const changedUpper = trigramByLines[changedLines.slice(3,6).join("")];

  const mutualLines = [baseLines[1],baseLines[2],baseLines[3],baseLines[2],baseLines[3],baseLines[4]];
  const mutualLower = trigramByLines[mutualLines.slice(0,3).join("")];
  const mutualUpper = trigramByLines[mutualLines.slice(3,6).join("")];

  document.getElementById("rem1").textContent = r1;
  document.getElementById("upperName").textContent = upper.name;
  document.getElementById("upperImage").textContent = upper.image;
  document.getElementById("rem2").textContent = r2;
  document.getElementById("lowerName").textContent = lower.name;
  document.getElementById("lowerImage").textContent = lower.image;
  document.getElementById("sum").textContent = sum;
  document.getElementById("moveRaw").textContent = moveRaw;
  document.getElementById("moveLine").textContent = move;
  document.getElementById("moveText").textContent = `第${yaoCn[move]}爻动`;

  document.getElementById("baseCard").innerHTML = buildHexagram(upper, lower, baseLines, "本卦", `动爻：第${yaoCn[move]}爻变`, move, "动");
  document.getElementById("mutualCard").innerHTML = buildHexagram(mutualUpper, mutualLower, mutualLines, "互卦", "互卦：2-5爻组合", move, "");
  document.getElementById("changedCard").innerHTML = buildHexagram(changedUpper, changedLower, changedLines, "变卦", `由第${yaoCn[move]}爻变得`, move, "变");

  const baseName = hex[upper.name][lower.name];
  const mutualName = hex[mutualUpper.name][mutualLower.name];
  const changedName = hex[changedUpper.name][changedLower.name];
  document.getElementById("summary").textContent = `本卦【${baseName}】　互卦【${mutualName}】　动爻：第${yaoCn[move]}爻　变卦【${changedName}】`;
  document.getElementById("interpret").innerHTML = buildInterpret(baseName, mutualName, changedName, move);
}
document.getElementById("num1").addEventListener("input", update);
document.getElementById("num2").addEventListener("input", update);
update();
</script>
</body>
</html>
